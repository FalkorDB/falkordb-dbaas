    serviceAccount: alert-reaction-actions-sa
    env:
    - name: GCP_PROJECT_ID
      value: "ctrl-plane-prod-b1b92df2"
    - name: GCP_LOCATION
      value: "us-central1"
    - name: WORKFLOW_NAME
      value: "falkordb-instance-disk-threshold-exceeded"
    - name: TIMEOUT_SECONDS
      value: "600"
    - name: WAIT_FOR_COMPLETION
      value: "true"
    # Alert data passed to workflow
    - name: ALERT_JSON
      valueFrom:
        alertRef:
          fieldPath: "."
---
