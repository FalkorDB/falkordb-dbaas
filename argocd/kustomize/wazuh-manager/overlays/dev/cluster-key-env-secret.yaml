# SealedSecret: wazuh-cluster-key
# Contains the Wazuh inter-node cluster key (CLUSTER_KEY).
# Seal with: kubeseal --format yaml --cert <cert> < secret.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: wazuh-cluster-key
  namespace: security
spec:
  encryptedData:
    CLUSTER_KEY: "REPLACE_WITH_SEALED_VALUE"
  template:
    metadata:
      name: wazuh-cluster-key
      namespace: security
    type: Opaque
