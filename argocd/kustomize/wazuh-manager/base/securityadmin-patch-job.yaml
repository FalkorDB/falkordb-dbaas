# Custom securityadmin job that initialises the OpenSearch security index.
#
# Why: The chart's ConfigMap renders internal_users.yml at Helm template time.
# ArgoCD renders client-side, so Helm lookup() can't read K8s secrets.
# The chart falls back to default password hashes.
# The chart's own securityadmin PostSync job is disabled (set to PostDelete).
# This job is the ONLY one that applies security config to the index.
#
# It copies the chart's ConfigMap configs (roles, roles_mapping, config, etc.)
# into a scratch dir, overlays internal_users.yml with hashes from sealed
# secrets (converting Python $2b$ to Java-compatible $2a$), then runs
# securityadmin.sh -cd against the full config directory.
apiVersion: batch/v1
kind: Job
metadata:
  name: wazuh-securityadmin-patch
  namespace: security
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        node_pool: security
      volumes:
        - name: admin-certs
          secret:
            secretName: admin-tls
        - name: node-certs
          secret:
            secretName: node-tls
        - name: indexer-conf
          configMap:
            name: wazuh-indexer-config
        - name: security-config
          emptyDir: {}
      containers:
        - name: securityadmin
          image: "wazuh/wazuh-indexer:4.14.1"
          imagePullPolicy: IfNotPresent
          env:
            - name: JAVA_HOME
              value: /usr/share/wazuh-indexer/jdk/
            - name: INDEXER_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: wazuh-indexer-cred
                  key: INDEXER_PASSWORD_HASH
            - name: DASHBOARD_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: wazuh-dashboard-cred
                  key: DASHBOARD_PASSWORD_HASH
          command:
            - /bin/bash
            - -ec
            - |
              # Copy security config files from the chart's ConfigMap into the
              # scratch dir (skip opensearch.yml — not a security config).
              for f in /indexer-conf/*.yml; do
                case "$(basename "$f")" in
                  opensearch.yml) continue ;;
                esac
                cp "$f" /security-config/
              done

              # Create default action_groups.yml if not provided by the chart.
              if [ ! -f /security-config/action_groups.yml ]; then
                printf '%s\n' '---' '_meta:' '  type: "actiongroups"' '  config_version: 2' \
                  > /security-config/action_groups.yml
              fi

              # Convert $2b$ (Python bcrypt) to $2a$ (Java-compatible bcrypt).
              ADMIN_HASH=$(echo "${INDEXER_PASSWORD_HASH}" | sed 's/\$2b\$/\$2a\$/')
              DASHBOARD_HASH=$(echo "${DASHBOARD_PASSWORD_HASH}" | sed 's/\$2b\$/\$2a\$/')

              # Overlay internal_users.yml with hashes from sealed secrets.
              cat > /security-config/internal_users.yml <<EOF
              ---
              _meta:
                type: "internalusers"
                config_version: 2
              admin:
                hash: "${ADMIN_HASH}"
                reserved: true
                backend_roles:
                  - "admin"
                description: "Admin user"
              kibanaserver:
                hash: "${DASHBOARD_HASH}"
                reserved: true
                description: "Kibana server user"
              EOF

              echo "admin hash: ${ADMIN_HASH:0:20}..."
              echo "kibanaserver hash: ${DASHBOARD_HASH:0:20}..."

              # Apply ALL security configs to the index.
              /usr/share/wazuh-indexer/plugins/opensearch-security/tools/securityadmin.sh \
                -cd /security-config/ \
                -nhnv \
                -cacert /certs/root-ca.pem \
                -cert /certs/admin.pem \
                -key /certs/admin-key.pem \
                -p 9200 \
                -icl \
                -h wazuh-indexer
          volumeMounts:
            - name: security-config
              mountPath: /security-config
            - name: indexer-conf
              mountPath: /indexer-conf
              readOnly: true
            - name: node-certs
              mountPath: /certs/root-ca.pem
              subPath: ca.crt
              readOnly: true
            - name: admin-certs
              mountPath: /certs/admin.pem
              subPath: tls.crt
              readOnly: true
            - name: admin-certs
              mountPath: /certs/admin-key.pem
              subPath: tls.key
              readOnly: true
