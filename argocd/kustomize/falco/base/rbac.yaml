# RBAC for Falco — read-only access to K8s API for metadata enrichment
# (pod names, namespaces, labels on syscall events).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: falco-reader
rules:
  - apiGroups: [""]
    resources:
      - pods
      - namespaces
      - nodes
      - services
      - replicationcontrollers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - daemonsets
      - deployments
      - replicasets
      - statefulsets
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: falco-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: falco-reader
subjects:
  - kind: ServiceAccount
    name: falco
    namespace: security
