apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-proxy
  namespace: customer-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-proxy
  template:
    metadata:
      labels:
        app: auth-proxy
    spec:
      containers:
        - name: auth-proxy-web
          image: us-central1-docker.pkg.dev/PROJECT/frontend/auth-proxy-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          envFrom:
            - secretRef:
                name: auth-proxy-env
