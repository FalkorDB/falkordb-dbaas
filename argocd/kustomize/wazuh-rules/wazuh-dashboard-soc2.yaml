    {"id": "nist_guide", "type": "visualization", "attributes": {"title": "NIST 800-53 - Control Families and Actions", "visState": "{\"title\": \"NIST 800-53 - Control Families and Actions\", \"type\": \"markdown\", \"params\": {\"markdown\": \"### Control Families Detected\\n| Control | Family | Description | Action When Triggered |\\n|---------|--------|------------|----------------------|\\n| **AU.5** | Audit | Response to audit failures | Verify log pipeline is healthy |\\n| **AU.6** | Audit | Audit review and reporting | Review flagged log entries |\\n| **AU.14** | Audit | Session audit | Check for unauthorized sessions |\\n| **CM.1** | Config Mgmt | Configuration policy | Verify config baseline compliance |\\n| **SI.4** | System Integrity | Information system monitoring | Investigate anomalous behavior |\\n| **AC.7** | Access Control | Unsuccessful login attempts | Check for brute-force attacks |\\n\\n### Interpretation Guide\\n- **High AU.* counts** = Active audit logging (good). Investigate anomalies only\\n- **CM.1 alerts** = Configuration drift detected. Cross-reference with SCA dashboard\\n- **SI.4 alerts** = System monitoring triggered. Could indicate compromise - investigate promptly\\n- **AC.7 alerts** = Failed logins. Check if brute-force -> block source IP\\n\\n### For Compliance Officers\\nNIST 800-53 maps to **FedRAMP** and **FISMA**. This dashboard provides continuous monitoring evidence.\\n\", \"openLinksInNewTab\": false, \"fontSize\": 12}, \"aggs\": []}", "kibanaSavedObjectMeta": {"searchSourceJSON": "{\"query\": {\"query\": \"\", \"language\": \"kuery\"}, \"filter\": []}"}}}

