    {"id": "comp_guide", "type": "visualization", "attributes": {"title": "Compliance Dashboard - Quick Reference", "visState": "{\"title\": \"Compliance Dashboard - Quick Reference\", \"type\": \"markdown\", \"params\": {\"markdown\": \"### Framework Coverage\\n| Framework | Field | What It Covers | Key for |\\n|-----------|-------|---------------|----------|\\n| **PCI DSS** | `rule.pci_dss` | Payment card data protection | Credit card processing |\\n| **NIST 800-53** | `rule.nist_800_53` | Federal security controls | Government / enterprise |\\n| **TSC / SOC 2** | `rule.tsc` | Trust Services Criteria (CC) | SaaS / cloud providers |\\n| **GDPR** | `rule.gdpr` | EU data privacy | EU customer data |\\n| **HIPAA** | `rule.hipaa` | Healthcare data protection | PHI handling |\\n| **MITRE ATT&CK** | `rule.mitre.*` | Adversary tactics and techniques | Threat detection |\\n\\n### How to Use This Dashboard\\n1. **Compare KPI counts** - large differences indicate gaps in rule mapping\\n2. **Check trend chart** - a flat line for any framework means no new detections (investigate)\\n3. **Review Top Rules table** - rules appearing across multiple frameworks are highest priority\\n4. **Click a framework KPI** -> Navigate to its detailed dashboard for drill-down\\n\\n### Audit Readiness\\n- All 6 frameworks should show **active detection** (non-zero counts)\\n- For SOC 2 audits: focus on **TSC** criteria CC6.x (access) and CC7.x (operations)\\n- Export data via **Reporting** menu for auditor evidence packages\\n\", \"openLinksInNewTab\": false, \"fontSize\": 12}, \"aggs\": []}", "kibanaSavedObjectMeta": {"searchSourceJSON": "{\"query\": {\"query\": \"\", \"language\": \"kuery\"}, \"filter\": []}"}}}

