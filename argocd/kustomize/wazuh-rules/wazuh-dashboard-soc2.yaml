    {"id": "tsc_guide", "type": "visualization", "attributes": {"title": "SOC 2 / TSC - Audit Readiness Guide", "visState": "{\"title\": \"SOC 2 / TSC - Audit Readiness Guide\", \"type\": \"markdown\", \"params\": {\"markdown\": \"### Trust Services Criteria (TSC) - What SOC 2 Auditors Evaluate\\n| Criteria | Name | What It Means | Your Action |\\n|----------|------|--------------|-------------|\\n| **CC6.1** | Logical Access | Access controls to protect assets | Review user access, MFA enforcement |\\n| **CC6.8** | Transmission Protection | Data encrypted in transit | Verify TLS on all endpoints |\\n| **CC7.1** | Detection | Identify anomalies and events | This dashboard = your evidence! |\\n| **CC7.2** | Monitoring | Monitor for unauthorized activity | Ensure agents cover all nodes |\\n| **CC7.3** | Evaluation | Assess impact of detected events | Document investigation outcomes |\\n| **CC8.1** | Change Management | Authorized changes only | Cross-ref with FIM alerts |\\n\\n### SOC 2 Audit Evidence Checklist\\n- **CC7.1**: Show this dashboard -> proves continuous monitoring is active\\n- **CC7.2**: Show agent inventory -> all production nodes have Wazuh agents\\n- **CC7.3**: Show Google Chat notifications -> proves alerting and response\\n- **CC6.8**: Show TLS/encryption alerts -> proves encrypted communications\\n- **CC8.1**: Show FIM alerts -> proves file change tracking\\n\\n### Red Flags to Investigate\\n- **CC7.2 count = 0** -> Monitoring gap! Some events are not being detected\\n- **Single criteria dominating** -> Good detection but investigate if it is noise\\n- **High severity on CC6.x** -> Potential unauthorized access. Investigate immediately!\\n\", \"openLinksInNewTab\": false, \"fontSize\": 12}, \"aggs\": []}", "kibanaSavedObjectMeta": {"searchSourceJSON": "{\"query\": {\"query\": \"\", \"language\": \"kuery\"}, \"filter\": []}"}}}

