    {"id": "sca_guide", "type": "visualization", "attributes": {"title": "SCA Remediation Guide", "visState": "{\"title\": \"SCA Remediation Guide\", \"type\": \"markdown\", \"params\": {\"markdown\": \"### What is SCA?\\nSecurity Configuration Assessment (SCA) checks nodes against **CIS Benchmarks** - industry-standard hardening guidelines.\\n\\n### How to Read This Dashboard\\n- **Score %** = passed checks / total checks. Target: **>= 80%**\\n- **Failed checks** = misconfigurations that need remediation\\n- Nodes below 80% are flagged for immediate attention\\n\\n### Remediation Workflow\\n1. **Sort SCA Scores by Node by lowest score** - prioritize worst nodes\\n2. **Check Failed Check Details table** - each row is a specific misconfiguration\\n3. **For each failed check:**\\n   - SSH into the node: `kubectl exec -it <pod> -- bash`\\n   - Run the remediation command from the CIS benchmark\\n   - Wait for next SCA scan (every 12h) or trigger manually\\n4. **Common quick fixes:**\\n   - *File permissions too open* -> `chmod 600 <file>`\\n   - *Service not disabled* -> `systemctl disable <service>`\\n   - *Kernel parameter wrong* -> Add to `/etc/sysctl.d/99-hardening.conf`\\n\\n### Escalation\\n- Score drops below **60%** -> Create incident, investigate for compromise\\n- New critical failed check on many nodes -> Possible misconfigured deployment\\n\", \"openLinksInNewTab\": false, \"fontSize\": 12}, \"aggs\": []}", "kibanaSavedObjectMeta": {"searchSourceJSON": "{\"query\": {\"query\": \"\", \"language\": \"kuery\"}, \"filter\": []}"}}}

