# Wazuh Dashboard saved objects for the SOC 2 Compliance view.
#
# Imported into the Wazuh Dashboard (OpenSearch Dashboards) at startup
# via a sidecar init container or the saved objects import API.
#
# Contains:
#   - SOC 2 Compliance Overview dashboard
#   - Prowler FAIL results visualization
#   - FIM events timeline
#   - Vulnerability inventory table
#   - MFA/Encryption status panel
apiVersion: v1
kind: ConfigMap
metadata:
  name: wazuh-dashboard-soc2
  namespace: security
  labels:
    app: wazuh
    component: dashboard
data:
  soc2-dashboard.ndjson: |
    {"id":"soc2-compliance-overview","type":"dashboard","attributes":{"title":"SOC 2 Compliance Overview","description":"Centralized SOC 2 compliance monitoring — Prowler failures, FIM events, vulnerability status, and MFA/Encryption checks.","panelsJSON":"[{\"gridData\":{\"x\":0,\"y\":0,\"w\":24,\"h\":6,\"i\":\"1\"},\"panelIndex\":\"1\",\"embeddableConfig\":{},\"panelRefName\":\"panel_prowler_fails\"},{\"gridData\":{\"x\":24,\"y\":0,\"w\":24,\"h\":6,\"i\":\"2\"},\"panelIndex\":\"2\",\"embeddableConfig\":{},\"panelRefName\":\"panel_fim_timeline\"},{\"gridData\":{\"x\":0,\"y\":6,\"w\":24,\"h\":8,\"i\":\"3\"},\"panelIndex\":\"3\",\"embeddableConfig\":{},\"panelRefName\":\"panel_vuln_table\"},{\"gridData\":{\"x\":24,\"y\":6,\"w\":24,\"h\":8,\"i\":\"4\"},\"panelIndex\":\"4\",\"embeddableConfig\":{},\"panelRefName\":\"panel_mfa_encryption\"},{\"gridData\":{\"x\":0,\"y\":14,\"w\":48,\"h\":8,\"i\":\"5\"},\"panelIndex\":\"5\",\"embeddableConfig\":{},\"panelRefName\":\"panel_agent_inventory\"}]","optionsJSON":"{\"useMargins\":true,\"hidePanelTitles\":false}","timeRestore":true,"timeTo":"now","timeFrom":"now-24h","kibanaSavedObjectMeta":{"searchSourceJSON":"{\"query\":{\"query\":\"\",\"language\":\"kuery\"},\"filter\":[]}"}},"references":[{"id":"panel_prowler_fails","name":"panel_prowler_fails","type":"visualization"},{"id":"panel_fim_timeline","name":"panel_fim_timeline","type":"visualization"},{"id":"panel_vuln_table","name":"panel_vuln_table","type":"visualization"},{"id":"panel_mfa_encryption","name":"panel_mfa_encryption","type":"visualization"},{"id":"panel_agent_inventory","name":"panel_agent_inventory","type":"visualization"}]}
    {"id":"panel_prowler_fails","type":"visualization","attributes":{"title":"Prowler SOC 2 FAIL Results","visState":"{\"title\":\"Prowler FAIL Results\",\"type\":\"table\",\"params\":{\"perPage\":25,\"showPartialRows\":false,\"showTotal\":false,\"totalFunc\":\"sum\"},\"aggs\":[{\"id\":\"1\",\"enabled\":true,\"type\":\"count\",\"schema\":\"metric\",\"params\":{}},{\"id\":\"2\",\"enabled\":true,\"type\":\"terms\",\"schema\":\"bucket\",\"params\":{\"field\":\"data.Status\",\"size\":5,\"order\":\"desc\",\"orderBy\":\"1\",\"otherBucket\":false,\"missingBucket\":false,\"include\":\"FAIL\"}},{\"id\":\"3\",\"enabled\":true,\"type\":\"terms\",\"schema\":\"bucket\",\"params\":{\"field\":\"data.Severity\",\"size\":5}},{\"id\":\"4\",\"enabled\":true,\"type\":\"terms\",\"schema\":\"bucket\",\"params\":{\"field\":\"data.CheckTitle\",\"size\":20}}]}","kibanaSavedObjectMeta":{"searchSourceJSON":"{\"index\":\"wazuh-alerts-*\",\"query\":{\"query\":\"rule.groups:\\\"prowler_compliance\\\" AND data.Status:\\\"FAIL\\\"\",\"language\":\"kuery\"},\"filter\":[]}"}}}
    {"id":"panel_fim_timeline","type":"visualization","attributes":{"title":"File Integrity Events (24h)","visState":"{\"title\":\"FIM Events Timeline\",\"type\":\"histogram\",\"params\":{\"addTooltip\":true,\"addLegend\":true,\"legendPosition\":\"right\",\"type\":\"histogram\"},\"aggs\":[{\"id\":\"1\",\"enabled\":true,\"type\":\"count\",\"schema\":\"metric\",\"params\":{}},{\"id\":\"2\",\"enabled\":true,\"type\":\"date_histogram\",\"schema\":\"segment\",\"params\":{\"field\":\"timestamp\",\"interval\":\"h\",\"min_doc_count\":0}},{\"id\":\"3\",\"enabled\":true,\"type\":\"terms\",\"schema\":\"group\",\"params\":{\"field\":\"syscheck.path\",\"size\":10}}]}","kibanaSavedObjectMeta":{"searchSourceJSON":"{\"index\":\"wazuh-alerts-*\",\"query\":{\"query\":\"rule.groups:\\\"syscheck\\\"\",\"language\":\"kuery\"},\"filter\":[]}"}}}
    {"id":"panel_vuln_table","type":"visualization","attributes":{"title":"Vulnerability Inventory","visState":"{\"title\":\"Vulnerability Inventory\",\"type\":\"table\",\"params\":{\"perPage\":25,\"showPartialRows\":false,\"showTotal\":true,\"totalFunc\":\"count\"},\"aggs\":[{\"id\":\"1\",\"enabled\":true,\"type\":\"count\",\"schema\":\"metric\",\"params\":{}},{\"id\":\"2\",\"enabled\":true,\"type\":\"terms\",\"schema\":\"bucket\",\"params\":{\"field\":\"data.vulnerability.severity\",\"size\":5}},{\"id\":\"3\",\"enabled\":true,\"type\":\"terms\",\"schema\":\"bucket\",\"params\":{\"field\":\"data.vulnerability.cve\",\"size\":25}},{\"id\":\"4\",\"enabled\":true,\"type\":\"terms\",\"schema\":\"bucket\",\"params\":{\"field\":\"agent.name\",\"size\":20}}]}","kibanaSavedObjectMeta":{"searchSourceJSON":"{\"index\":\"wazuh-alerts-*\",\"query\":{\"query\":\"rule.groups:\\\"vulnerability-detector\\\"\",\"language\":\"kuery\"},\"filter\":[]}"}}}
    {"id":"panel_mfa_encryption","type":"visualization","attributes":{"title":"MFA & Encryption Status","visState":"{\"title\":\"MFA & Encryption Status\",\"type\":\"metric\",\"params\":{\"addTooltip\":true,\"addLegend\":false,\"type\":\"metric\",\"metric\":{\"percentageMode\":false,\"colorSchema\":\"Green to Red\",\"useRanges\":false,\"style\":{\"bgFill\":\"#000\",\"bgColor\":false,\"labelColor\":false,\"subText\":\"\",\"fontSize\":40}}},\"aggs\":[{\"id\":\"1\",\"enabled\":true,\"type\":\"count\",\"schema\":\"metric\",\"params\":{\"customLabel\":\"MFA Failures\"}},{\"id\":\"2\",\"enabled\":true,\"type\":\"count\",\"schema\":\"metric\",\"params\":{\"customLabel\":\"Encryption Issues\"}}]}","kibanaSavedObjectMeta":{"searchSourceJSON":"{\"index\":\"wazuh-alerts-*\",\"query\":{\"query\":\"(data.CheckID:*mfa* OR data.CheckID:*encryption* OR data.CheckID:*kms*) AND data.Status:\\\"FAIL\\\"\",\"language\":\"kuery\"},\"filter\":[]}"}}}
    {"id":"panel_agent_inventory","type":"visualization","attributes":{"title":"Wazuh Agent Inventory","visState":"{\"title\":\"Agent Inventory\",\"type\":\"table\",\"params\":{\"perPage\":50,\"showPartialRows\":false,\"showTotal\":true,\"totalFunc\":\"count\"},\"aggs\":[{\"id\":\"1\",\"enabled\":true,\"type\":\"count\",\"schema\":\"metric\",\"params\":{}},{\"id\":\"2\",\"enabled\":true,\"type\":\"terms\",\"schema\":\"bucket\",\"params\":{\"field\":\"agent.name\",\"size\":100}},{\"id\":\"3\",\"enabled\":true,\"type\":\"terms\",\"schema\":\"bucket\",\"params\":{\"field\":\"agent.ip\",\"size\":100}},{\"id\":\"4\",\"enabled\":true,\"type\":\"terms\",\"schema\":\"bucket\",\"params\":{\"field\":\"agent.os.platform\",\"size\":10}}]}","kibanaSavedObjectMeta":{"searchSourceJSON":"{\"index\":\"wazuh-alerts-*\",\"query\":{\"query\":\"\",\"language\":\"kuery\"},\"filter\":[]}"}}}
