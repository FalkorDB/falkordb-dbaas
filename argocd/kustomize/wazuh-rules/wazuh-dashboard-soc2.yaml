  security-dashboards.ndjson: '{"id": "sec_guide", "type": "visualization", "attributes": {"title": "Action Guide", "visState": "{\"title\": \"Action Guide\", \"type\": \"markdown\", \"params\": {\"markdown\": \"### Escalation Matrix\\n| Level | Severity | SLA | Action |\\n|-------|----------|-----|--------|\\n| **12-15** | Critical | **15 min** | Page on-call, create incident |\\n| **10-11** | High | **1 hour** | Investigate, notify team lead |\\n| **7-9** | Medium | **4 hours** | Review in next triage meeting |\\n| **1-6** | Low/Info | Next day | Monitor trends only |\\n\\n### Quick Triage Steps\\n1. **Check Critical Alerts table below** - these need immediate action\\n2. **Spike in trend chart?** - Correlate with recent deployments or config changes\\n3. **New rule category?** - Verify not a false positive; update rules if needed\\n4. **Single agent dominating?** - Check agent health dashboard for compromise indicators\\n5. **Level >= 10 alerts** - Automatically sent to **Google Chat**\\n\", \"openLinksInNewTab\": false, \"fontSize\": 12}, \"aggs\": []}", "kibanaSavedObjectMeta": {"searchSourceJSON": "{\"query\": {\"query\": \"\", \"language\": \"kuery\"}, \"filter\": []}"}}}

