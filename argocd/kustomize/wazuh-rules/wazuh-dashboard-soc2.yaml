    {"id": "mitre_guide", "type": "visualization", "attributes": {"title": "MITRE ATT&CK - Threat Response Playbook", "visState": "{\"title\": \"MITRE ATT&CK - Threat Response Playbook\", \"type\": \"markdown\", \"params\": {\"markdown\": \"### Active Threat Response Matrix\\n| Tactic | What It Means | Immediate Action |\\n|--------|--------------|------------------|\\n| **Initial Access** | Attacker gaining foothold | Check ingress logs, rotate compromised credentials |\\n| **Execution** | Running malicious code | Kill suspicious processes, isolate node |\\n| **Persistence** | Maintaining access | Check crontabs, systemd units, SSH keys |\\n| **Privilege Escalation** | Gaining higher access | Audit sudo configs, check for SUID binaries |\\n| **Defense Evasion** | Hiding from detection | HIGH PRIORITY! Check if security tools were disabled |\\n| **Credential Access** | Stealing credentials | Force password rotation, check for keyloggers |\\n| **Lateral Movement** | Moving between nodes | Check network connections, isolate affected segments |\\n| **Exfiltration** | Stealing data | Block outbound connections, preserve evidence |\\n\\n### Response Priority\\n1. **Defense Evasion** -> Someone may be disabling your security. Investigate IMMEDIATELY\\n2. **Credential Access / Lateral Movement** -> Active breach likely. Activate incident response\\n3. **Execution / Persistence** -> Compromise confirmed. Contain and remediate\\n4. **Initial Access** -> Early detection. Block and harden entry points\\n\\n### Investigation Commands\\n```\\n# Check what MITRE techniques were seen on a specific agent\\n# Filter this dashboard by agent.name to isolate one node\\n\\n# Check for Defense Evasion (T1562 - Impair Defenses)\\n# Look for stopped/disabled Wazuh agent or modified configs\\n```\\n\", \"openLinksInNewTab\": false, \"fontSize\": 12}, \"aggs\": []}", "kibanaSavedObjectMeta": {"searchSourceJSON": "{\"query\": {\"query\": \"\", \"language\": \"kuery\"}, \"filter\": []}"}}}

