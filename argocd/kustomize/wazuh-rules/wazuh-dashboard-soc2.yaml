    {"id": "agent_guide", "type": "visualization", "attributes": {"title": "Agent Health - Troubleshooting Guide", "visState": "{\"title\": \"Agent Health - Troubleshooting Guide\", \"type\": \"markdown\", \"params\": {\"markdown\": \"### What to Monitor\\n- **Connected Agents** should match expected node count. Missing agents = blind spots\\n- **Rootcheck findings** indicate potential rootkits or system integrity issues\\n- **Docker errors** may signal container runtime problems\\n\\n### Troubleshooting Playbook\\n| Symptom | Likely Cause | Action |\\n|---------|-------------|--------|\\n| Agent count drops | Node scaled down or agent crashed | Check `kubectl get pods -n security -l app=wazuh-agent` |\\n| Single agent flooding alerts | Compromise or misconfiguration | Isolate node, check agent logs |\\n| Rootcheck spike | New deployment triggered false positives | Compare with recent deployments |\\n| Docker errors increasing | Runtime instability | Check `containerd` / `dockerd` logs on affected nodes |\\n\\n### Agent Investigation Commands\\n```\\n# List all Wazuh agents and status\\nkubectl exec -n security wazuh-manager-master-0 -- /var/ossec/bin/agent_control -l\\n\\n# Check specific agent logs\\nkubectl exec -n security wazuh-manager-master-0 -- /var/ossec/bin/agent_control -i <AGENT_ID>\\n```\\n\", \"openLinksInNewTab\": false, \"fontSize\": 12}, \"aggs\": []}", "kibanaSavedObjectMeta": {"searchSourceJSON": "{\"query\": {\"query\": \"\", \"language\": \"kuery\"}, \"filter\": []}"}}}

