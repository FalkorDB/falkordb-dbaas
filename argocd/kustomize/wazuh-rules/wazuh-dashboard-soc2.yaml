# Wazuh Dashboard saved objects for security monitoring.
#
# Imported into the Wazuh Dashboard (OpenSearch Dashboards) at startup
# via the saved objects import API in the postStart lifecycle hook.
#
# Contains 8 dashboards (85 saved objects total):
#
# Operational dashboards:
#   1. Security Posture Overview — single-pane-of-glass KPIs, trends, severity
#   2. SCA Compliance Detail — CIS benchmark scores, failed checks, trends
#   3. Agent & Infrastructure Health — agent inventory, rootcheck, docker errors
#
# Compliance framework dashboards:
#   4. Regulatory Compliance Overview — cross-framework KPIs & comparison
#   5. PCI DSS Compliance — requirements breakdown, trends, agent mapping
#   6. NIST 800-53 Compliance — controls breakdown, trends, agent mapping
#   7. TSC / SOC 2 Compliance — criteria breakdown, trends, agent mapping
#   8. MITRE ATT&CK — tactics, techniques, threat mapping
#
# Plus retained visualizations:
#   - Prowler Compliance Failures (active once syslog bridge delivers data)
#   - File Integrity Events (active once FIM/syscheck triggers)
apiVersion: v1
kind: ConfigMap
metadata:
  name: wazuh-dashboard-soc2
  namespace: security
  labels:
    app: wazuh
    component: dashboard
