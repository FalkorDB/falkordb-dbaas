    {"id": "pci_guide", "type": "visualization", "attributes": {"title": "PCI DSS - Requirements Reference and Actions", "visState": "{\"title\": \"PCI DSS - Requirements Reference and Actions\", \"type\": \"markdown\", \"params\": {\"markdown\": \"### Key PCI DSS Requirements Detected\\n| Requirement | Description | What to Check |\\n|-------------|------------|---------------|\\n| **2.2** | System hardening | Default configs changed? Unnecessary services disabled? |\\n| **6.5** | Secure development | Code injection, XSS, SQLi protections in place? |\\n| **8.1** | User identification | Unique IDs for all users? Shared accounts eliminated? |\\n| **10.2** | Audit logging | All access to cardholder data logged? |\\n| **10.6** | Log review | Logs reviewed daily? Anomalies investigated? |\\n| **11.5** | File integrity | FIM alerts on critical files investigated? |\\n\\n### Action Items\\n- **High count on 10.2/10.6** = Good! Means logging is working. Review for anomalies\\n- **Alerts on 2.2** = Hardening gap. Check SCA dashboard for specifics\\n- **Alerts on 11.5** = File changes detected. Verify they are authorized\\n- **No alerts on a requirement** = Either compliant OR not being monitored (investigate!)\\n\\n### For PCI Auditors\\nExport this dashboard as PDF via **Share > PDF Reports** for evidence of continuous monitoring.\\n\", \"openLinksInNewTab\": false, \"fontSize\": 12}, \"aggs\": []}", "kibanaSavedObjectMeta": {"searchSourceJSON": "{\"query\": {\"query\": \"\", \"language\": \"kuery\"}, \"filter\": []}"}}}

