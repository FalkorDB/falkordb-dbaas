# Custom Wazuh integration script for Google Chat webhooks.
# Deployed as a ConfigMap and mounted into the Wazuh Manager at
# /var/ossec/integrations/custom-google-chat
#
# Wazuh calls this script with:
#   argv[1] = alert file path (JSON)
#   argv[2] = API key (not used — webhook URL is passed via hook_url)
#   argv[3] = hook_url
apiVersion: v1
kind: ConfigMap
metadata:
  name: wazuh-google-chat-integration
  namespace: security
  labels:
    app: wazuh
    component: integration
data:
  custom-google-chat: |
    #!/usr/bin/env python3
    """Wazuh custom integration: forward alerts to Google Chat via webhook."""
    import json
    import os
    import sys
    import urllib.request
    import urllib.error

    ALERT_FILE = sys.argv[1]
    # Read the webhook URL from the mounted secret file (preferred),
    # then try env var, then the ossec.conf hook_url arg.
    SECRET_PATH = "/var/ossec/etc/secrets/google-chat/WAZUH_GOOGLE_CHAT_WEBHOOK_URL"
    _arg_url = sys.argv[3] if len(sys.argv) > 3 else ""
    HOOK_URL = ""
    if os.path.isfile(SECRET_PATH):
        with open(SECRET_PATH) as _sf:
            HOOK_URL = _sf.read().strip()
    if not HOOK_URL:
        HOOK_URL = os.environ.get("WAZUH_GOOGLE_CHAT_WEBHOOK_URL") or _arg_url
    if not HOOK_URL or HOOK_URL == "FROM_SECRET":
        print("ERROR: No webhook URL provided", file=sys.stderr)
        sys.exit(1)

    with open(ALERT_FILE) as f:
        alert = json.load(f)

    rule = alert.get("rule", {})
    agent = alert.get("agent", {})
    level = rule.get("level", 0)

    # Map severity to emoji
    if level >= 13:
        icon = "🔴"
    elif level >= 10:
        icon = "🟠"
    elif level >= 7:
        icon = "🟡"
    else:
        icon = "🔵"

    text = (
        f"{icon} *Wazuh Alert — Level {level}*\n"
        f"*Rule:* {rule.get('id', 'N/A')} — {rule.get('description', 'No description')}\n"
        f"*Agent:* {agent.get('name', 'N/A')} (ID: {agent.get('id', 'N/A')})\n"
        f"*Groups:* {', '.join(rule.get('groups', []))}\n"
        f"*Timestamp:* {alert.get('timestamp', 'N/A')}"
    )

    full_description = alert.get("full_log", alert.get("data", {}).get("title", ""))
    if full_description:
        # Truncate to avoid exceeding Google Chat message limit (4096 chars)
        if len(full_description) > 500:
            full_description = full_description[:500] + "…"
        text += f"\n*Details:* {full_description}"

    payload = json.dumps({"text": text}).encode("utf-8")

    req = urllib.request.Request(
        HOOK_URL,
        data=payload,
        headers={"Content-Type": "application/json; charset=UTF-8"},
        method="POST",
    )

    try:
        with urllib.request.urlopen(req, timeout=10) as resp:
            if resp.status not in (200, 201):
                print(f"WARNING: Google Chat returned status {resp.status}", file=sys.stderr)
    except urllib.error.URLError as e:
        print(f"ERROR: Failed to post to Google Chat: {e}", file=sys.stderr)
        sys.exit(1)
  custom-google-chat.py: |
    #!/usr/bin/env python3
    # Symlink target — Wazuh looks for both custom-<name> and custom-<name>.py
    import importlib, sys
    sys.argv[0] = sys.argv[0].replace('.py', '')
    exec(open(sys.argv[0]).read())
