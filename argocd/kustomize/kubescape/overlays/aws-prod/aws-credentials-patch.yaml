# Patch KubeScape CronJob for GCS SA key on non-GCP clusters.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kubescape-scan
  namespace: security
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: kubescape
              env:
                - name: GOOGLE_APPLICATION_CREDENTIALS
                  value: /var/run/secrets/gcs/sa-key.json
              volumeMounts:
                - name: gcs-sa-key
                  mountPath: /var/run/secrets/gcs
                  readOnly: true
          volumes:
            - name: gcs-sa-key
              secret:
                secretName: kubescape-gcs-credentials
