apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: security
resources:
  - ../../base
  - secrets-env-secret.yaml
configMapGenerator:
  - name: kubescape-config
    behavior: create
    literals:
      - cluster-name=ctrl-plane-prod
      - wazuh-syslog-host=wazuh.security.svc.cluster.local
generatorOptions:
  disableNameSuffixHash: true
patches:
  - path: wi-patch.yaml
