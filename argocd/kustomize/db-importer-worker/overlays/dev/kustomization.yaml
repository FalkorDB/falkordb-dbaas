apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: api

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: db-importer-worker
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "us-central1-docker.pkg.dev/ctrl-plane-dev-f7a2434f/backend/db-importer-worker:1.0.1"
