apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability

resources:
  - ../../base

patches:
  - target:
      kind: CronJob
      name: alert-silence-syncer
    patch: |-
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/containers/0/image
        value: "us-central1-docker.pkg.dev/ctrl-plane-dev-f7a2434f/backend/alert-silence-syncer:latest"
