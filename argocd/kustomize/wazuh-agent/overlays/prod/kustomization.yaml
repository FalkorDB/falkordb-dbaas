apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: security
resources:
  - ../../base
configMapGenerator:
  - name: wazuh-agent-config
    behavior: create
    literals:
      - manager-ip=${WAZUH_STATIC_IP}
      - agent-group=ctrl-plane-prod
generatorOptions:
  disableNameSuffixHash: true
