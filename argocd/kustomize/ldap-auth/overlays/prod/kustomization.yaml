apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ldap-auth

resources:
  - ../../base/
  - https://github.com/FalkorDB/ldap-auth-rs.git//k8s/overlays/production

patches:
  - target:
      kind: Deployment
      name: ldap-auth-rs
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "docker.io/falkordb/ldap-auth-rs:0.4.2"
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          node_pool: observability
  - target:
      kind: StatefulSet
      name: redis
    patch: |-
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          node_pool: observability
  - target:
      kind: StatefulSet
      name: redis-replica
    patch: |-
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          node_pool: observability
      - op: add
        path: /spec/template/spec/affinity
        value:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: cache
                    app.kubernetes.io/part-of: ldap-auth
                topologyKey: kubernetes.io/hostname
  - target:
      kind: HorizontalPodAutoscaler
      name: ldap-auth-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 3
  - target:
      kind: ConfigMap
      name: ldap-auth-config
    patch: |-
      - op: replace
        path: /data/LDAP_BASE_DN
        value: "dc=falkordb,dc=cloud"
      - op: replace
        path: /data/LDAP_SEARCH_BIND_ORG
        value: "admin"
  - target:
      kind: StringSecret
      name: ldap-auth-secrets
    patch: |-
      - op: replace
        path: /spec/fields/1/encoding
        value: base64url
  - target:
      kind: Certificate
      name: ldap-auth-tls-cert
    patch: |-
      - op: add
        path: /spec/dnsNames/-
        value: "localhost"
  - target:
      kind: Service
      name: ldap-auth-service
    patch: |-
      - op: add
        path: /spec/ports/-
        value:
          name: ldaps
          port: 3390
          targetPort: ldap
          protocol: TCP
  - target:
      kind: Service
      name: ldap-auth-headless
    patch: |-
      - op: add
        path: /spec/ports/-
        value:
          name: ldaps
          port: 3390
          targetPort: ldap
          protocol: TCP

patchesStrategicMerge:
  - |-
    apiVersion: monitoring.coreos.com/v1
    kind: ServiceMonitor
    metadata:
      name: ldap-auth-metrics
    $patch: delete
