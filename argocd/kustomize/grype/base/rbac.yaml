# RBAC for Grype — read-only access to list pods across all namespaces
# so the scanner can discover running container images.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: grype-image-reader
rules:
  - apiGroups: [""]
    resources:
      - pods
      - namespaces
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grype-image-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: grype-image-reader
subjects:
  - kind: ServiceAccount
    name: grype
    namespace: security
