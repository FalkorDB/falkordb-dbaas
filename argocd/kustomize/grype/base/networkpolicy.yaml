# NetworkPolicy — Grype CVE scanner CronJob pods
# Allows egress to: DNS, K8s API, GCS, container registries, Wazuh syslog,
# PyPI, GitHub (grype/syft binary download). Denies all ingress.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grype-netpol
  namespace: security
spec:
  podSelector:
    matchLabels:
      app: grype
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HTTPS — K8s API, GCS, container registries, PyPI, GitHub releases
    - ports:
        - protocol: TCP
          port: 443
    # Wazuh syslog forwarding
    - ports:
        - protocol: TCP
          port: 514
