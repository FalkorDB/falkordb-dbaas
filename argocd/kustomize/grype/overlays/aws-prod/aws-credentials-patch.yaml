# Patch the Grype CronJob to inject AWS credentials for ECR image access
# and GCS SA key for uploading evidence to the central GCS bucket.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: grype-cve-scan
  namespace: security
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: grype
              env:
                - name: AWS_ROLE_ARN
                  valueFrom:
                    secretKeyRef:
                      name: grype-aws-credentials
                      key: role-arn
                - name: AWS_DEFAULT_REGION
                  valueFrom:
                    secretKeyRef:
                      name: grype-aws-credentials
                      key: region
                - name: GOOGLE_APPLICATION_CREDENTIALS
                  value: /var/run/secrets/gcs/sa-key.json
              volumeMounts:
                - name: gcs-sa-key
                  mountPath: /var/run/secrets/gcs
                  readOnly: true
          volumes:
            - name: gcs-sa-key
              secret:
                secretName: grype-gcs-credentials
