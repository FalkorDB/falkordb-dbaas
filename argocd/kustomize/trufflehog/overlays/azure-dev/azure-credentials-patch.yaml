# Patch the TruffleHog CronJob to inject Azure credentials for ACR image access
# and GCS SA key for uploading evidence to the central GCS bucket.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: trufflehog-secret-scan
  namespace: security
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: trufflehog
              env:
                - name: AZURE_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: trufflehog-azure-credentials
                      key: client-id
                - name: AZURE_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: trufflehog-azure-credentials
                      key: client-secret
                - name: AZURE_TENANT_ID
                  valueFrom:
                    secretKeyRef:
                      name: trufflehog-azure-credentials
                      key: tenant-id
                - name: AZURE_SUBSCRIPTION_ID
                  valueFrom:
                    secretKeyRef:
                      name: trufflehog-azure-credentials
                      key: subscription-id
                - name: GOOGLE_APPLICATION_CREDENTIALS
                  value: /var/run/secrets/gcs/sa-key.json
              volumeMounts:
                - name: gcs-sa-key
                  mountPath: /var/run/secrets/gcs
                  readOnly: true
          volumes:
            - name: gcs-sa-key
              secret:
                secretName: trufflehog-gcs-credentials
