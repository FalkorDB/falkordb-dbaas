apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: security
resources:
  - ../../base
configMapGenerator:
  - name: compliance-report-config
    behavior: create
    literals:
      - evidence-bucket=falkordb-security-evidence-prod
generatorOptions:
  disableNameSuffixHash: true
patches:
  - target:
      kind: ServiceAccount
      name: compliance-report
    patch: |
      - op: add
        path: /metadata/annotations
        value:
          iam.gke.io/gcp-service-account: compliance-report@ctrl-plane-prod-b1b92df2.iam.gserviceaccount.com
