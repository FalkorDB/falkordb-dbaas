apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: security
resources:
  - ../../base
  - secrets-env-secret.yaml
configMapGenerator:
  - name: prowler-config
    behavior: create
    literals:
      - cloud-provider=azure
      - cluster-name=app-plane-azure-prod
      - compliance=cis_2.0_azure
      - wazuh-syslog-host=REPLACE_WITH_PROD_WAZUH_IP
generatorOptions:
  disableNameSuffixHash: true
patches:
  - path: azure-credentials-patch.yaml
