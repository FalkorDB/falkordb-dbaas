# Patch ServiceAccount with GCP Workload Identity annotation.
# prowler-uploader SA has objectCreator on the evidence-locker bucket.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prowler
  namespace: security
  annotations:
    iam.gke.io/gcp-service-account: prowler-uploader@PROJECT_ID.iam.gserviceaccount.com
