apiVersion: batch/v1
kind: CronJob
metadata:
  name: prowler-soc2-scan
  namespace: security
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: prowler
              env:
                - name: AWS_ROLE_ARN
                  valueFrom:
                    secretKeyRef:
                      name: prowler-aws-credentials
                      key: role-arn
                - name: AWS_DEFAULT_REGION
                  valueFrom:
                    secretKeyRef:
                      name: prowler-aws-credentials
                      key: region
                - name: GOOGLE_APPLICATION_CREDENTIALS
                  value: /var/run/secrets/gcs/sa-key.json
              volumeMounts:
                - name: gcs-sa-key
                  mountPath: /var/run/secrets/gcs
                  readOnly: true
          volumes:
            - name: gcs-sa-key
              secret:
                secretName: prowler-gcs-credentials
