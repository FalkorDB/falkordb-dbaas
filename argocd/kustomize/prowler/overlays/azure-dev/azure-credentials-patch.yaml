# Patch the Prowler CronJob to inject Azure Service Principal credentials.
# These are stored in a Sealed Secret (prowler-azure-credentials) and
# provide read-only access to the Azure subscription for compliance scanning.
# Also injects GCS SA key for uploading evidence to the central GCS bucket.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: prowler-soc2-scan
  namespace: security
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: prowler
              env:
                - name: AZURE_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: prowler-azure-credentials
                      key: client-id
                - name: AZURE_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: prowler-azure-credentials
                      key: client-secret
                - name: AZURE_TENANT_ID
                  valueFrom:
                    secretKeyRef:
                      name: prowler-azure-credentials
                      key: tenant-id
                - name: AZURE_SUBSCRIPTION_ID
                  valueFrom:
                    secretKeyRef:
                      name: prowler-azure-credentials
                      key: subscription-id
                - name: GOOGLE_APPLICATION_CREDENTIALS
                  value: /var/run/secrets/gcs/sa-key.json
              volumeMounts:
                - name: gcs-sa-key
                  mountPath: /var/run/secrets/gcs
                  readOnly: true
          volumes:
            - name: gcs-sa-key
              secret:
                secretName: prowler-gcs-credentials
