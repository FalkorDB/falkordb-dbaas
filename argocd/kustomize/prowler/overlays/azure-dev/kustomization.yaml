apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: security
resources:
  - ../../base
configMapGenerator:
  - name: prowler-config
    behavior: create
    literals:
      - evidence-bucket=falkordb-evidence-locker-dev
      - cloud-provider=azure
      - cluster-name=app-plane-azure-dev
generatorOptions:
  disableNameSuffixHash: true
patchesStrategicMerge:
  - azure-credentials-patch.yaml
