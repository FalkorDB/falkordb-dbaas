apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: security
resources:
  - ../../base
  - secrets-env-secret.yaml
configMapGenerator:
  - name: prowler-config
    behavior: create
    literals:
      - cloud-provider=gcp
      - cluster-name=app-plane-gcp-dev
      - compliance=cis_2.0_gcp
generatorOptions:
  disableNameSuffixHash: true
patches:
  - path: wi-patch.yaml
