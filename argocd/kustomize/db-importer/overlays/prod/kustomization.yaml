apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: api

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: db-importer
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "us-central1-docker.pkg.dev/ctrl-plane-prod-b1b92df2/backend/db-importer:1.1.1"
