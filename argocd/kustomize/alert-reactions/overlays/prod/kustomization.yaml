apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - redis-crash-alert-env-secret.yaml
  - redis-crash-loop-github-token-secret.yaml

patches:
  # ServiceAccount: use prod GCP project SA
  - target:
      kind: ServiceAccount
      name: alert-reaction-actions-sa
    patch: |-
      - op: replace
        path: /metadata/annotations/iam.gke.io~1gcp-service-account
        value: "alert-reaction-actions@ctrl-plane-prod-b1b92df2.iam.gserviceaccount.com"

  # falkordb-oom AlertReactions: swap GCP project ID
  - target:
      kind: AlertReaction
      name: falkordb-out-of-memory-alert
    patch: |-
      - op: replace
        path: /spec/actions/0/env/0/value
        value: "ctrl-plane-prod-b1b92df2"

  - target:
      kind: AlertReaction
      name: falkordb-out-of-memory-alert-critical
    patch: |-
      - op: replace
        path: /spec/actions/0/env/0/value
        value: "ctrl-plane-prod-b1b92df2"

  # oom-killed: prod Grafana URL env var + environment=prod in workflow dispatch
  - target:
      kind: AlertReaction
      name: container-oom-killed-alert
    patch: |-
      - op: replace
        path: /spec/actions/0/env/9/value
        value: "https://grafana.observability.internal.falkordb.cloud"
      - op: replace
        path: /spec/actions/0/args/0
        value: |
          # Install curl and jq
          apk add --no-cache curl jq

          echo "=========================================="
          echo "ContainerOOMKilled Alert Triggered"
          echo "Cluster: ${CLUSTER}"
          echo "Pod: ${POD_NAME}"
          echo "Container: ${CONTAINER}"
          echo "Namespace: ${NAMESPACE}"
          echo "=========================================="

          echo "Triggering GitHub workflow..."

          HTTP_STATUS=$(curl -sS --max-time 10 -X POST \
            -o /tmp/workflow_body \
            -w "%{http_code}" \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            "${GITHUB_API}/repos/${WORKFLOW_REPO_OWNER}/${WORKFLOW_REPO_NAME}/actions/workflows/${WORKFLOW_FILE}/dispatches" \
            -d "$(jq -n \
              --arg ref "main" \
              --arg pod "${POD_NAME}" \
              --arg namespace "${NAMESPACE}" \
              --arg cluster "${CLUSTER}" \
              --arg container "${CONTAINER}" \
              --arg grafana_url "${GRAFANA_URL}" \
              --arg env "prod" \
              '{
                ref: $ref,
                inputs: {
                  pod: $pod,
                  namespace: $namespace,
                  cluster: $cluster,
                  container: $container,
                  grafana_url: $grafana_url,
                  environment: $env
                }
              }')")

          WORKFLOW_RESPONSE=$(cat /tmp/workflow_body)

          if [ "${HTTP_STATUS:0:1}" != "2" ]; then
            echo "❌ Failed to trigger workflow (HTTP ${HTTP_STATUS})"
            echo "${WORKFLOW_RESPONSE}" | jq '.' 2>/dev/null || echo "${WORKFLOW_RESPONSE}"
            exit 1
          fi

          echo "✅ Workflow triggered successfully (HTTP ${HTTP_STATUS})"

  # redis-crash: prod vmauth URL, environment=prod, and prod Grafana URL
  - target:
      kind: AlertReaction
      name: redis-crash-alert
    patch: |-
      - op: replace
        path: /spec/actions/1/env/11/value
        value: "https://grafana.observability.internal.falkordb.cloud"
      - op: replace
        path: /spec/actions/1/args/0
        value: |
          # Install curl and jq
          apk add --no-cache curl jq

          echo "=========================================="
          echo "Redis Crash Alert Triggered"
          echo "Cluster: ${CLUSTER}"
          echo "Pod: ${POD_NAME}"
          echo "Container: service"
          echo "Namespace: ${NAMESPACE}"
          echo "=========================================="

          # Trigger GitHub Workflow with minimal context
          echo "Triggering GitHub workflow..."

          HTTP_STATUS=$(curl -sS --max-time 10 -X POST \
            -o /tmp/workflow_body \
            -w "%{http_code}" \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            "${GITHUB_API}/repos/${WORKFLOW_REPO_OWNER}/${WORKFLOW_REPO_NAME}/actions/workflows/${WORKFLOW_FILE}/dispatches" \
            -d "$(jq -n \
              --arg ref "main" \
              --arg pod "${POD_NAME}" \
              --arg namespace "${NAMESPACE}" \
              --arg cluster "${CLUSTER}" \
              --arg container "service" \
              --arg vmauth "https://vmauth.observability.internal.falkordb.cloud" \
              --arg env "prod" \
              --arg grafana "${GRAFANA_URL}" \
              '{
                ref: $ref,
                inputs: {
                  pod: $pod,
                  namespace: $namespace,
                  cluster: $cluster,
                  container: $container,
                  vmauth_url: $vmauth,
                  environment: $env,
                  grafana_url: $grafana
                }
              }')")

          WORKFLOW_RESPONSE=$(cat /tmp/workflow_body)

          if [ "${HTTP_STATUS:0:1}" != "2" ]; then
            echo "❌ Failed to trigger workflow (HTTP ${HTTP_STATUS})"
            echo "${WORKFLOW_RESPONSE}" | jq '.' 2>/dev/null || echo "${WORKFLOW_RESPONSE}"
            exit 1
          fi

          echo "✅ Workflow triggered successfully (HTTP ${HTTP_STATUS})"
          echo "All processing will be handled by the GitHub workflow"
