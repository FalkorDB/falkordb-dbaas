# oauth2-proxy — Identity-Aware Proxy for security dashboards.
#
# Runs as a ClusterIP service in the security namespace.
# Nginx Ingress auth-url annotations on Wazuh Dashboard and ThreatMapper
# Console route every request through /oauth2/auth before forwarding.
#
# Restricted to the devops@falkordb.com Google Group via --allowed-group.
# Uses Google OIDC as the identity provider with IAP brand OAuth client
# provisioned by OpenTofu (tofu/runtime/gcp/infra/security.tf).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: security
  labels:
    app: oauth2-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      nodeSelector:
        node_pool: security
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --provider=google
            - --email-domain=falkordb.com
            - --allowed-group=devops@falkordb.com
            - --google-group=devops@falkordb.com
            - --http-address=0.0.0.0:4180
            - --reverse-proxy=true
            - --set-xauthrequest=true
            - --pass-access-token=false
            - --skip-provider-button=false
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --cookie-httponly=true
            - --cookie-expire=8h
            - --upstream=static://200
            - --silence-ping-logs=true
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-credentials
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-credentials
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-credentials
                  key: cookie-secret
            - name: OAUTH2_PROXY_GOOGLE_SERVICE_ACCOUNT_JSON
              value: /var/run/secrets/google/sa-key.json
          ports:
            - name: http
              containerPort: 4180
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: google-sa
              mountPath: /var/run/secrets/google
              readOnly: true
      volumes:
        - name: google-sa
          secret:
            secretName: oauth2-proxy-credentials
            items:
              - key: google-admin-sa-json
                path: sa-key.json
