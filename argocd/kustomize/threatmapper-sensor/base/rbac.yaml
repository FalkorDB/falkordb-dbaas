# ThreatMapper Sensor needs read access to pods, containers, and network
# topology for vulnerability scanning and attack path mapping.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: threatmapper-sensor
rules:
  - apiGroups: [""]
    resources:
      - pods
      - services
      - endpoints
      - namespaces
      - nodes
      - configmaps
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
      - statefulsets
      - replicasets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - networkpolicies
      - ingresses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: threatmapper-sensor-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: threatmapper-sensor
subjects:
  - kind: ServiceAccount
    name: threatmapper-sensor
    namespace: security
