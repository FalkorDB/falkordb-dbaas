# ThreatMapper Sensor Agent — runs on every node to collect container
# metadata, network topology, and vulnerability data, reporting to the
# central ThreatMapper Management Console on the GCP control plane.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: threatmapper-sensor
  namespace: security
  labels:
    app: threatmapper-sensor
spec:
  selector:
    matchLabels:
      app: threatmapper-sensor
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: threatmapper-sensor
    spec:
      serviceAccountName: threatmapper-sensor
      hostPID: true
      hostNetwork: true
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
      containers:
        - name: sensor
          image: deepfenceio/deepfence_agent_ce:3.0.0-mahanth
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            privileged: true
          env:
            - name: MGMT_CONSOLE_URL
              valueFrom:
                secretKeyRef:
                  name: threatmapper-sensor-key
                  key: console-url
            - name: MGMT_CONSOLE_PORT
              value: "443"
            - name: DEEPFENCE_KEY
              valueFrom:
                secretKeyRef:
                  name: threatmapper-sensor-key
                  key: api-key
            - name: USER_DEFINED_TAGS
              valueFrom:
                configMapKeyRef:
                  name: threatmapper-sensor-config
                  key: cluster-name
            # Node identification
            - name: DF_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock
              readOnly: true
            - name: containerd-sock
              mountPath: /run/containerd/containerd.sock
              readOnly: true
            - name: sys-kernel
              mountPath: /sys/kernel/debug
              readOnly: true
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pgrep -f deepfence
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        - name: containerd-sock
          hostPath:
            path: /run/containerd/containerd.sock
            type: Socket
        - name: sys-kernel
          hostPath:
            path: /sys/kernel/debug
