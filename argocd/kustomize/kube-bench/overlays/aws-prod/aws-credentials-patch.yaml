# Patch the kube-bench CronJob to inject GCS SA key for uploading evidence.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kube-bench-cis-scan
  namespace: security
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: kube-bench
              env:
                - name: GOOGLE_APPLICATION_CREDENTIALS
                  value: /var/run/secrets/gcs/sa-key.json
              volumeMounts:
                - name: gcs-sa-key
                  mountPath: /var/run/secrets/gcs
                  readOnly: true
          volumes:
            - name: gcs-sa-key
              secret:
                secretName: kube-bench-gcs-credentials
