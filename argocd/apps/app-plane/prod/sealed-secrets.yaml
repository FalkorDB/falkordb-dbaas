# Sealed Secrets controller — deployed to all app-plane clusters via ApplicationSet.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: sealed-secrets
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            role: app-plane
  template:
    metadata:
      name: '{{ regexFind "h?c-[A-Za-z0-9]+" .name }}-sealed-secrets'
    spec:
      project: default
      source:
        chart: sealed-secrets
        repoURL: https://bitnami-labs.github.io/sealed-secrets
        targetRevision: 2.17.2
        helm:
          releaseName: sealed-secrets
          valuesObject:
            fullnameOverride: "sealed-secrets"
            secretName: "sealed-secrets-app-plane-key"
            keyrenewperiod: "0"
      destination:
        server: "{{.server}}"
        namespace: sealed-secrets
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
        automated:
          prune: true
          selfHeal: true
