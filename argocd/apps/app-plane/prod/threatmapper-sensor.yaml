# ThreatMapper Sensor — production app-plane spoke clusters.
# Security: No internet-facing endpoints — outbound-only.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: threatmapper-sensor
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            role: app-plane
  template:
    metadata:
      name: '{{ regexFind "h?c-[A-Za-z0-9]+" .name }}-tm-sensor'
    spec:
      project: default
      source:
        repoURL: https://github.com/FalkorDB/falkordb-dbaas.git
        targetRevision: main
        path: argocd/kustomize/threatmapper-sensor/overlays/prod
      destination:
        server: "{{.server}}"
        namespace: security
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
        automated:
          prune: true
          selfHeal: true
