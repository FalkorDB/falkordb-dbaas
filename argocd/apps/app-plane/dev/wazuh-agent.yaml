# Wazuh Agent — deployed to all app-plane clusters via ApplicationSet.
# Each spoke cluster gets a Wazuh Agent DaemonSet that reports to the
# central Wazuh Manager on the GCP control plane.
#
# Security: No Services or Ingresses — agent-only workload with no
# internet-facing endpoints. Outbound-only connection to Manager.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: wazuh-agent
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            role: app-plane
  template:
    metadata:
      name: '{{ regexFind "h?c-[A-Za-z0-9]+" .name }}-wazuh-agent'
    spec:
      project: default
      source:
        repoURL: https://github.com/FalkorDB/falkordb-dbaas.git
        targetRevision: dev
        path: argocd/kustomize/wazuh-agent/overlays/app-plane-dev
      destination:
        server: "{{.server}}"
        namespace: security
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
        automated:
          prune: true
          selfHeal: true
