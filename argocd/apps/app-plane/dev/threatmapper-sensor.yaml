# ThreatMapper Sensor — deployed to all app-plane clusters via ApplicationSet.
# Each spoke cluster gets a DaemonSet reporting back to the central
# ThreatMapper Management Console on the GCP control plane.
#
# Security: No Services or Ingresses — sensor-only workload with no
# internet-facing endpoints. Outbound-only connection to Console.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: threatmapper-sensor
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            role: app-plane
  template:
    metadata:
      name: '{{ regexFind "h?c-[A-Za-z0-9]+" .name }}-tm-sensor'
    spec:
      project: default
      source:
        repoURL: https://github.com/FalkorDB/falkordb-dbaas.git
        targetRevision: dev
        path: argocd/kustomize/threatmapper-sensor/overlays/dev
      destination:
        server: "{{.server}}"
        namespace: security
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
        automated:
          prune: true
          selfHeal: true
