apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: customer-ldap-api
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: "ldap=us-central1-docker.pkg.dev/ctrl-plane-prod-b1b92df2/backend/customer-ldap"
    argocd-image-updater.argoproj.io/ldap.update-strategy: semver
    argocd-image-updater.argoproj.io/ldap.allow-tags: regexp:^[0-9]+\.[0-9]+\.[0-9]+$
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/argocd-image-updater-git-secret
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: default
  source:
    repoURL: https://github.com/FalkorDB/falkordb-dbaas.git
    targetRevision: main
    path: argocd/kustomize/customer-ldap-api/overlays/prod
    kustomize:
      patches:
        - target:
            kind: Deployment
            name: customer-ldap-api
          patch: |-
            - op: add
              path: /spec/template/spec/nodeSelector
              value:
                node_pool: backend
  destination:
    server: https://kubernetes.default.svc
    namespace: api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: secretgenerator.mittwald.de
      kind: StringSecret
      jsonPointers:
        - /spec/fields
