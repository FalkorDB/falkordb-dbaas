apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alert-silence-syncer
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: "syncer=us-central1-docker.pkg.dev/ctrl-plane-prod-b1b92df2/backend/alert-silence-syncer"
    argocd-image-updater.argoproj.io/syncer.update-strategy: semver
    argocd-image-updater.argoproj.io/syncer.allow-tags: regexp:^[0-9]+\.[0-9]+\.[0-9]+$
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: default
  source:
    repoURL: https://github.com/FalkorDB/falkordb-dbaas.git
    targetRevision: main
    path: argocd/kustomize/alert-silence-syncer/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
