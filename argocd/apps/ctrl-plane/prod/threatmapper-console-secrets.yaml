# ThreatMapper Console secrets — sealed API key for sensor auth.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: threatmapper-console-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/FalkorDB/falkordb-dbaas.git
    targetRevision: HEAD
    path: argocd/kustomize/threatmapper-console/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
