# Wazuh Manager — central SIEM/XDR hub (production).
# See dev/wazuh.yaml for detailed comments.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wazuh
  namespace: argocd
spec:
  project: default
  source:
    chart: wazuh
    repoURL: https://morgoved.github.io/wazuh-helm/
    targetRevision: 1.0.22
    helm:
      releaseName: wazuh
      valuesObject:
        cert-manager:
          enabled: false
        certificates:
          enabled: true
        agent:
          enabled: false

        wazuh:
          enabled: true
          nodeSelector:
            node_pool: security
          # Cluster communication key (no existingSecret support)
          key: "3689236e86827eb977577f17f8a3d310"
          authd:
            enabled: true
          # LoadBalancer managed separately via kustomize (wazuh-manager)
          apiCred:
            existingSecret: "wazuh-api-cred"
          loadBalancer:
            enabled: false

          master:
            enabled: true
            resources:
              requests:
                cpu: "2"
                memory: "4Gi"
              limits:
                cpu: "4"
                memory: "8Gi"
            storageSize: 100Gi
            storageClass: "standard-rwo"
            service:
              type: ClusterIP
              annotations: {}
              ports:
                - name: registration
                  protocol: TCP
                  port: 1515
                  targetPort: 1515
                - name: api
                  protocol: TCP
                  port: 55000
                  targetPort: 55000
            additionalVolumes:
              - name: custom-rules
                configMap:
                  name: wazuh-custom-rules
              - name: google-chat-integration
                configMap:
                  name: wazuh-google-chat-integration
                  defaultMode: 0755
              - name: authd-pass
                secret:
                  secretName: wazuh-manager-authd
            additionalVolumeMounts:
              - name: custom-rules
                mountPath: /wazuh-config-mount/etc/rules/local_rules.xml
                subPath: local_rules.xml
                readOnly: true
              - name: authd-pass
                mountPath: /wazuh-config-mount/etc/authd.pass
                subPath: authd.pass
                readOnly: true
              - name: google-chat-integration
                mountPath: /var/ossec/integrations/custom-google-chat
                subPath: custom-google-chat
                readOnly: true
              - name: google-chat-integration
                mountPath: /var/ossec/integrations/custom-google-chat.py
                subPath: custom-google-chat.py
                readOnly: true
            extraConf: |
              <syscheck>
                <frequency>43200</frequency>
                <scan_on_start>yes</scan_on_start>
                <directories check_all="yes" realtime="yes">/etc</directories>
                <directories check_all="yes">/usr/bin</directories>
                <directories check_all="yes">/usr/sbin</directories>
                <directories check_all="yes">/bin</directories>
              </syscheck>
              <integration>
                <name>custom-google-chat</name>
                <hook_url>FROM_SECRET</hook_url>
                <level>10</level>
                <alert_format>json</alert_format>
              </integration>
            extraSpec:
              container:
                envFrom:
                  - secretRef:
                      name: wazuh-google-chat-webhook

          worker:
            enabled: true
            replicas: 2
            resources:
              requests:
                cpu: "2"
                memory: "4Gi"
              limits:
                cpu: "4"
                memory: "8Gi"
            storageSize: 100Gi
            storageClass: "standard-rwo"

        indexer:
          enabled: true
          replicas: 3
          cred:
            existingSecret: "wazuh-indexer-cred"
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          nodeSelector:
            node_pool: security
          storageSize: 200Gi
          storageClass: "standard-rwo"
          env:
            OPENSEARCH_JAVA_OPTS: "-Xms4g -Xmx4g -Dlog4j2.formatMsgNoLookups=true"
          job:
            annotations:
              argocd.argoproj.io/hook: PostSync
              argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation

        dashboard:
          enabled: true
          replicas: 2
          cred:
            existingSecret: "wazuh-dashboard-cred"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          nodeSelector:
            node_pool: security
          ingress:
            enabled: true
            className: nginx
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt-prod"
              nginx.ingress.kubernetes.io/auth-url: "https://auth.security.internal.falkordb.cloud/oauth2/auth"
              nginx.ingress.kubernetes.io/auth-signin: "https://auth.security.internal.falkordb.cloud/oauth2/start?rd=$scheme://$host$escaped_request_uri"
              nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Email"
            host: "wazuh.security.internal.falkordb.cloud"
            tls:
              - secretName: wazuh-dashboard-tls
                hosts:
                  - wazuh.security.internal.falkordb.cloud
          extraSpec:
            pod:
              volumes:
                - name: soc2-dashboard
                  configMap:
                    name: wazuh-dashboard-soc2
                - name: api-cred
                  secret:
                    secretName: wazuh-api-cred
            container:
              volumeMounts:
                - name: soc2-dashboard
                  mountPath: /usr/share/wazuh-dashboard/config/soc2-dashboard.ndjson
                  subPath: soc2-dashboard.ndjson
                  readOnly: true
                - name: api-cred
                  mountPath: /run/secrets/api-cred
                  readOnly: true
              lifecycle:
                postStart:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - |
                        WAZUH_YML=/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml
                        # Wait for wazuh.yml to be created by the plugin (up to 120s)
                        for i in $(seq 1 60); do
                          [ -f "$WAZUH_YML" ] && break
                          sleep 2
                        done
                        if [ -f "$WAZUH_YML" ]; then
                          API_USER=$(cat /run/secrets/api-cred/API_USERNAME)
                          API_PASS=$(cat /run/secrets/api-cred/API_PASSWORD)
                          sed -i "/hosts:/,/password:/{s|username:.*|username: $API_USER|;s|password:.*|password: $API_PASS|}" "$WAZUH_YML"
                        fi
                        sleep 30 && curl -sS -k -XPOST \
                          "https://localhost:5601/api/saved_objects/_import?overwrite=true" \
                          -H "osd-xsrf: true" \
                          --form file=@/usr/share/wazuh-dashboard/config/soc2-dashboard.ndjson \
                          || true

  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    automated:
      prune: true
      selfHeal: true
  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
