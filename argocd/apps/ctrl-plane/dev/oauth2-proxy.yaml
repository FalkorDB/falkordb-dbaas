# OAuth2 Proxy — Identity-Aware Proxy for security dashboards.
# Protects Wazuh Dashboard and ThreatMapper Console behind Google OIDC,
# restricted to the devops@falkordb.com Google Group.
#
# Must be deployed BEFORE Wazuh and ThreatMapper so the auth-url
# endpoint is available when their ingresses are created.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oauth2-proxy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/FalkorDB/falkordb-dbaas.git
    targetRevision: HEAD
    path: argocd/kustomize/oauth2-proxy/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
