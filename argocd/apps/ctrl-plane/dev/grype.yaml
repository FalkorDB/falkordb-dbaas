# Grype CVE vulnerability scanner — daily CronJob that scans all running
# container images and pushes reports to the central GCS Evidence Locker.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grype
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/FalkorDB/falkordb-dbaas.git
    targetRevision: dev
    path: argocd/kustomize/grype/overlays/ctrl-plane-dev
  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
