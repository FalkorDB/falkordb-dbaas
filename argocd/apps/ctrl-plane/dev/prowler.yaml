# Prowler SOC 2 compliance scanner — daily CronJob that pushes reports
# to the central GCS Evidence Locker.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prowler
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/FalkorDB/falkordb-dbaas.git
    targetRevision: dev
    path: argocd/kustomize/prowler/overlays/gcp-dev
  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
