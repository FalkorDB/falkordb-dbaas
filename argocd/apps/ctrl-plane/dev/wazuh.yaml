# Wazuh Manager — central SIEM/XDR hub for multi-cloud security monitoring.
#
# Deployed via the official Wazuh Helm chart (wazuh/wazuh).
# Agents in spoke clusters (AWS/Azure/GCP app planes) connect to the
# regional static IP on ports 1514 (agent enrollment) and 1515 (syslog).
#
# The Wazuh Dashboard is exposed on port 443 via the nginx ingress controller.
# mTLS is enforced for agent ↔ manager communication.
#
# Persistent storage:
#   - Wazuh Manager data: 50Gi (standard-rwo)
#   - Wazuh Indexer data: 100Gi (standard-rwo)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wazuh
  namespace: argocd
spec:
  project: default
  source:
    chart: wazuh
    repoURL: https://packages.wazuh.com/4.x/helm/
    targetRevision: 4.9.2
    helm:
      releaseName: wazuh
      valuesObject:
        wazuh:
          manager:
            replicas: 2
            resources:
              requests:
                cpu: "1"
                memory: "2Gi"
              limits:
                cpu: "2"
                memory: "4Gi"
            nodeSelector:
              node_pool: security
            config:
              # Enable mTLS for agent communication
              auth:
                use_source_ip: "no"
                force_insert: "yes"
                force_time: 0
                purge: "yes"
                use_password: "yes"
                ssl_agent_ca: /var/ossec/etc/sslmanager.ca
                ssl_verify_host: "no"
                ssl_auto_negotiate: "no"
              # Enable vulnerability detector
              vulnerability-detector:
                enabled: "yes"
                interval: 5m
                run_on_start: "yes"
                providers:
                  - name: canonical
                    enabled: "yes"
                  - name: debian
                    enabled: "yes"
                  - name: redhat
                    enabled: "yes"
                  - name: nvd
                    enabled: "yes"
              # File Integrity Monitoring
              syscheck:
                frequency: 43200
                scan_on_start: "yes"
                directories:
                  - path: /etc
                    check_all: "yes"
                    realtime: "yes"
                  - path: /usr/bin
                    check_all: "yes"
                  - path: /usr/sbin
                    check_all: "yes"
                  - path: /bin
                    check_all: "yes"
              # Google Chat integration for alerts — webhook URL is injected
              # from the sealed secret (GOOGLE_CHAT_WEBHOOK_URL env var);
              # the hook_url value below is a placeholder that satisfies
              # ossec.conf schema validation while the script reads the
              # real URL from the environment.
              integration:
                - name: custom-google-chat
                  hook_url: "FROM_SECRET"
                  level: 10
                  alert_format: "json"
            # Mount custom SOC 2 rules and integrations from ConfigMaps
            extraEnvFrom:
              - secretRef:
                  name: wazuh-google-chat-webhook
              - secretRef:
                  name: wazuh-manager-authd
            extraVolumes:
              - name: custom-rules
                configMap:
                  name: wazuh-custom-rules
              - name: google-chat-integration
                configMap:
                  name: wazuh-google-chat-integration
                  defaultMode: 0755
            extraVolumeMounts:
              - name: custom-rules
                mountPath: /var/ossec/etc/rules/local_rules.xml
                subPath: local_rules.xml
                readOnly: true
              - name: google-chat-integration
                mountPath: /var/ossec/integrations/custom-google-chat
                subPath: custom-google-chat
                readOnly: true
              - name: google-chat-integration
                mountPath: /var/ossec/integrations/custom-google-chat.py
                subPath: custom-google-chat.py
                readOnly: true
            persistence:
              enabled: true
              storageClass: "standard-rwo"
              size: 50Gi
            service:
              type: LoadBalancer
              loadBalancerIP: "34.46.116.195"
              annotations:
                # Regional external LB for agent enrollment
                cloud.google.com/load-balancer-type: "External"
              ports:
                - name: agents-events
                  port: 1514
                  protocol: TCP
                  targetPort: 1514
                - name: agent-enrollment
                  port: 1515
                  protocol: TCP
                  targetPort: 1515
                - name: syslog-tcp
                  port: 514
                  protocol: TCP
                  targetPort: 514
                - name: api
                  port: 55000
                  protocol: TCP
                  targetPort: 55000

          indexer:
            replicas: 3
            resources:
              requests:
                cpu: "1"
                memory: "2Gi"
              limits:
                cpu: "2"
                memory: "4Gi"
            nodeSelector:
              node_pool: security
            persistence:
              enabled: true
              storageClass: "standard-rwo"
              size: 100Gi

          dashboard:
            replicas: 1
            resources:
              requests:
                cpu: "500m"
                memory: "1Gi"
              limits:
                cpu: "1"
                memory: "2Gi"
            nodeSelector:
              node_pool: security
            # Import SOC 2 saved objects on startup
            extraVolumes:
              - name: soc2-dashboard
                configMap:
                  name: wazuh-dashboard-soc2
            extraVolumeMounts:
              - name: soc2-dashboard
                mountPath: /usr/share/wazuh-dashboard/config/soc2-dashboard.ndjson
                subPath: soc2-dashboard.ndjson
                readOnly: true
            lifecycleHooks:
              postStart:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - |
                      sleep 30 && curl -sS -k -XPOST \
                        "https://localhost:5601/api/saved_objects/_import?overwrite=true" \
                        -H "osd-xsrf: true" \
                        --form file=@/usr/share/wazuh-dashboard/config/soc2-dashboard.ndjson \
                        || true
            ingress:
              enabled: true
              annotations:
                cert-manager.io/cluster-issuer: "letsencrypt-prod"
                kubernetes.io/ingress.class: nginx
                # IAP — oauth2-proxy enforces Google OIDC + group membership
                nginx.ingress.kubernetes.io/auth-url: "https://auth.security.dev.internal.falkordb.cloud/oauth2/auth"
                nginx.ingress.kubernetes.io/auth-signin: "https://auth.security.dev.internal.falkordb.cloud/oauth2/start?rd=$scheme://$host$escaped_request_uri"
                nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Email"
              hosts:
                - host: wazuh.security.dev.internal.falkordb.cloud
                  paths:
                    - path: /
                      pathType: Prefix
              tls:
                - secretName: wazuh-dashboard-tls
                  hosts:
                    - wazuh.security.dev.internal.falkordb.cloud

  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    automated:
      prune: true
      selfHeal: true
  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
