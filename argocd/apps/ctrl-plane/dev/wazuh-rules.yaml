# Wazuh Rules — ConfigMaps for custom SOC 2 detection rules and
# Wazuh Dashboard saved objects.  Must be deployed before the
# Wazuh Manager Application so the volumes can mount successfully.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wazuh-rules
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/FalkorDB/falkordb-dbaas.git
    targetRevision: dev
    path: argocd/kustomize/wazuh-rules
  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
