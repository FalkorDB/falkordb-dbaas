apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wazuh-manager-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/FalkorDB/falkordb-dbaas.git
    targetRevision: dev
    path: argocd/kustomize/wazuh-manager/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
