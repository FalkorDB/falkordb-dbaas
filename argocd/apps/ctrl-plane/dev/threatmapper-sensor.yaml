# ThreatMapper Sensor — DaemonSet agent for runtime vulnerability scanning
# and network topology mapping.  Deployed to all nodes; reports back to
# the central ThreatMapper Management Console.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: threatmapper-sensor
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/FalkorDB/falkordb-dbaas.git
    targetRevision: dev
    path: argocd/kustomize/threatmapper-sensor/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
