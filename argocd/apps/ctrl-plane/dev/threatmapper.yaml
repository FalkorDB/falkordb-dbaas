# ThreatMapper Management Console — runtime vulnerability scanning and
# attack path visualization for multi-cloud Kubernetes workloads.
#
# Deployed via the Deepfence Helm chart. Sensor agents in spoke clusters
# connect back to this console over HTTPS (port 443).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: threatmapper
  namespace: argocd
spec:
  project: default
  source:
    chart: deepfence-console
    repoURL: https://deepfence-helm-charts.s3.amazonaws.com/threatmapper
    targetRevision: 2.4.0
    helm:
      releaseName: threatmapper
      valuesObject:
        global:
          storageClass: "standard-rwo"

        console:
          replicas: 1
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          nodeSelector:
            node_pool: security
          service:
            type: ClusterIP

        router:
          replicas: 1
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          nodeSelector:
            node_pool: security

        ingress:
          enabled: true
          annotations:
            cert-manager.io/cluster-issuer: "letsencrypt-prod"
            kubernetes.io/ingress.class: nginx
          hosts:
            - host: threatmapper.security.dev.internal.falkordb.cloud
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: threatmapper-tls
              hosts:
                - threatmapper.security.dev.internal.falkordb.cloud

        postgres:
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          nodeSelector:
            node_pool: security
          storage:
            size: 30Gi

        redis:
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          nodeSelector:
            node_pool: security

        neo4j:
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          nodeSelector:
            node_pool: security
          storage:
            size: 30Gi

        kafka:
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          nodeSelector:
            node_pool: security
          storage:
            size: 50Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    automated:
      prune: true
      selfHeal: true
  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
