name: AI Crash Triage

permissions:
  contents: read
  id-token: write
  issues: write

on:
  push:
    branches:
      - 672-ai-triage-of-crashes
    paths:
      - '.github/workflows/ai-crash-triage.yml'

  workflow_dispatch:
    inputs:
      issue_number:
        description: 'GitHub issue number in FalkorDB/private'
        required: true
        type: string
      pod:
        description: 'Pod name (e.g. cluster-mz-2)'
        required: true
        type: string
      namespace:
        description: 'Namespace / instance ID (e.g. instance-2d4avy8xj)'
        required: true
        type: string
      cluster:
        description: 'Cluster name (e.g. hc-zgqs8ywmz)'
        required: true
        type: string
      container:
        description: 'Container name'
        required: false
        type: string
        default: 'service'
      vmauth_url:
        description: 'VMAuth URL for log collection'
        required: true
        type: string
      environment:
        description: 'Environment (dev or prod)'
        required: true
        type: choice
        options:
          - prod
          - dev
      rdb_url:
        description: 'GCS path (gs://…) or legacy signed URL for dump.rdb'
        required: false
        type: string
        default: ''
      aof_url:
        description: 'GCS path (gs://…) or legacy signed URL for appendonlydir.tar.gz'
        required: false
        type: string
        default: ''
      falkordb_version:
        description: 'FalkorDB version (optional, e.g. v4.18.0)'
        required: false
        type: string
        default: ''

  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      pod:
        required: true
        type: string
      namespace:
        required: true
        type: string
      cluster:
        required: true
        type: string
      container:
        required: false
        type: string
        default: 'service'
      vmauth_url:
        required: true
        type: string
      environment:
        required: true
        type: string
      rdb_url:
        required: false
        type: string
        default: ''
      aof_url:
        required: false
        type: string
        default: ''
      falkordb_version:
        required: false
        type: string
        default: ''

env:
  ISSUE_REPO: 'FalkorDB/private'

jobs:
  # On push: no-op job just to register the workflow with GitHub
  register:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Workflow registered. You can now trigger it manually via workflow_dispatch."

  ai-triage:
    if: ${{ github.event_name != 'push' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Check authorised actor
        env:
          ACTOR: ${{ github.actor }}
        run: |
          ALLOWED_USERS=("swilly22" "MuhammadQadora" "dudizimber" "AviAvni" "barakb")
          for user in "${ALLOWED_USERS[@]}"; do
            if [[ "$ACTOR" == "$user" ]]; then
              echo "Actor '$ACTOR' is authorised. Proceeding."
              exit 0
            fi
          done
          echo "Actor '$ACTOR' is not authorised to run this workflow."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: '3.11'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Copilot CLI and Python deps
        run: |
          npm install -g @github/copilot
          pip install github-copilot-sdk requests pydantic

      - name: Authenticate to GCP
        if: ${{ startsWith(inputs.rdb_url, 'gs://') || startsWith(inputs.aof_url, 'gs://') }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCS_SA_EMAIL }}

      - name: Set environment variables
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          VMAUTH_PASS_DEV: ${{ secrets.VMAUTH_PASSWORD_DEV }}
          VMAUTH_PASS_PROD: ${{ secrets.VMAUTH_PASSWORD_PROD }}
        run: |
          if [ "$ENVIRONMENT" = "dev" ]; then
            echo "VMAUTH_PASSWORD=$VMAUTH_PASS_DEV" >> $GITHUB_ENV
          else
            echo "VMAUTH_PASSWORD=$VMAUTH_PASS_PROD" >> $GITHUB_ENV
          fi

      - name: Run AI crash triage
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ISSUE_REPO: ${{ env.ISSUE_REPO }}
          VMAUTH_URL: ${{ inputs.vmauth_url }}
          VMAUTH_USERNAME: ${{ vars.VMAUTH_USERNAME }}
          VMAUTH_PASSWORD: ${{ env.VMAUTH_PASSWORD }}
        run: |
          cd scripts
          python ai_crash_triage.py \
            --issue-number "${{ inputs.issue_number }}" \
            --pod "${{ inputs.pod }}" \
            --namespace "${{ inputs.namespace }}" \
            --cluster "${{ inputs.cluster }}" \
            --container "${{ inputs.container }}" \
            --vmauth-url "$VMAUTH_URL" \
            ${{ inputs.rdb_url != '' && format('--rdb-url "{0}"', inputs.rdb_url) || '' }} \
            ${{ inputs.aof_url != '' && format('--aof-url "{0}"', inputs.aof_url) || '' }} \
            ${{ inputs.falkordb_version != '' && format('--falkordb-version "{0}"', inputs.falkordb_version) || '' }}
