name: Build backends

on:
  push:
    paths:
      - 'backend/**'
      - .github/workflows/build-backends.yaml
  pull_request:
    paths:
      - 'backend/**'
      - .github/workflows/build-backends.yaml
  workflow_dispatch:

permissions:
  contents: "read"
  id-token: "write"
  pull-requests: "write"

jobs:
  build-and-push-docker:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: db-importer-worker
          - name: db-importer
          - name: cluster-discovery
            test: "true"
          - name: alert-silence-syncer
          - name: customer-ldap
            test: "true"
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24.x.x"
          cache: "pnpm"
          cache-dependency-path: backend

      - name: Install pnpm
        working-directory: backend
        run: pnpm i --frozen-lockfile

      - name: Build dependencies
        working-directory: backend
        run: pnpm run build:libs

      - name: Run Tests
        if: matrix.service.test == 'true'
        working-directory: ./backend/services/${{ matrix.service.name }}
        run: pnpm test -- --reporter=jest-junit --ci --coverage

      - name: Authenticate to Google Cloud
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Docker Login
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Get version from package.json
        id: version
        run: |
          echo "VERSION=$(node -p "require('./backend/services/${{ matrix.service.name }}/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Set tags
        id: set-tags
        run: |
          BASE_IMAGE="us-central1-docker.pkg.dev/${{ secrets.TF_CTRL_PLANE_PROJECT_ID }}/backend/${{ matrix.service.name }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            # Immutable dev tag: semver pre-release with run number, plus sha for traceability
            echo "TAGS=${BASE_IMAGE}:${{ steps.version.outputs.VERSION }}-dev.${{ github.run_number }},${BASE_IMAGE}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            # Immutable prod tag: semver only
            echo "TAGS=${BASE_IMAGE}:${{ steps.version.outputs.VERSION }},${BASE_IMAGE}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          else
            # Feature branches: sha tag only (not pushed unless manually dispatched)
            echo "TAGS=${BASE_IMAGE}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker Build
        id: build-push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') }}
          build-args: |
            PROJECT=${{ matrix.service.name }}
          tags: ${{ steps.set-tags.outputs.TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # load locally only when not pushing (push and load are mutually exclusive exporters)
          load: ${{ !(github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')) }}

      - name: Grype image scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ fromJSON(steps.build-push.outputs.metadata)['image.name'] }}
          fail-build: "false"
          severity-cutoff: high
          output-format: table
