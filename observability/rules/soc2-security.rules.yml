# VMRule for SOC 2 security alerting.
# These integrate with the VictoriaMetrics stack and route through
# the existing Alertmanager → PagerDuty / Slack pipeline.
#
# Metrics strategy:
#   - Prowler: uses kube-state-metrics CronJob/Job metrics (available by default)
#   - Wazuh:   uses up{} service monitor + Wazuh Prometheus exporter if deployed

apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: soc2-security-rules
  namespace: observability
  labels:
    is_logs: "false"
spec:
  groups:
    - name: soc2.prowler
      interval: 5m
      rules:
        - alert: ProwlerScanFailing
          expr: |
            kube_job_status_failed{job_name=~"prowler-soc2-scan-.*"} > 0
          for: 30m
          labels:
            severity: warning
            team: security
          annotations:
            summary: "Prowler SOC 2 scan job is failing"
            description: "Prowler CronJob has failed runs. Evidence collection is degraded. Check CronJob logs in the security namespace."
            runbook_url: "https://falkordb.atlassian.net/wiki/spaces/SEC/pages/soc2-remediation"

        - alert: ProwlerScanStale
          expr: |
            time() - max(kube_cronjob_status_last_successful_time{cronjob="prowler-soc2-scan"}) > 172800
          for: 1h
          labels:
            severity: warning
            team: security
          annotations:
            summary: "Prowler scan data is stale (>48h)"
            description: "No successful Prowler scan in over 48 hours. Check the Prowler CronJob status in the security namespace."

        - alert: ProwlerCronJobSuspended
          expr: |
            kube_cronjob_spec_suspend{cronjob="prowler-soc2-scan"} == 1
          for: 1h
          labels:
            severity: warning
            team: security
          annotations:
            summary: "Prowler CronJob is suspended"
            description: "The Prowler SOC 2 CronJob has been suspended. Compliance scanning is not running."

    - name: soc2.wazuh
      interval: 1m
      rules:
        - alert: WazuhManagerDown
          expr: up{job="wazuh-manager"} == 0
          for: 5m
          labels:
            severity: critical
            team: security
          annotations:
            summary: "Wazuh Manager is unreachable"
            description: "The central Wazuh Manager has been down for >5 minutes. All agent communication is interrupted."

        - alert: WazuhAgentDaemonSetUnavailable
          expr: |
            kube_daemonset_status_number_unavailable{daemonset="wazuh-agent"} > 0
          for: 15m
          labels:
            severity: warning
            team: security
          annotations:
            summary: "{{ $value }} Wazuh agent pod(s) unavailable"
            description: "Wazuh agent DaemonSet has unavailable pods for >15 minutes. Host security monitoring coverage is degraded."

        - alert: WazuhAgentDaemonSetMisscheduled
          expr: |
            kube_daemonset_status_number_misscheduled{daemonset="wazuh-agent"} > 0
          for: 15m
          labels:
            severity: warning
            team: security
          annotations:
            summary: "Wazuh agent pod(s) misscheduled"
            description: "Wazuh agent DaemonSet has misscheduled pods. Investigate node scheduling."


