apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  namespace: observability
  name: ldap.rules
  labels:
    is_logs: "false"
spec:
  groups:
    # -----------------------------------------------------------------------
    # BullMQ queue alerts — metrics scraped from customer-ldap-api
    # (ctrl-plane only; will produce no data on app-plane clusters)
    # -----------------------------------------------------------------------
    - name: ldap.rules.queue
      rules:
        - alert: CustomerLDAPQueueBacklogWarning
          expr: bullmq_queue_jobs_waiting{job="customer-ldap"} > 50
          for: 10m
          labels:
            severity: warning
            cluster: '{{ $labels.cluster }}'
            queue: '{{ $labels.queue }}'
          annotations:
            summary: "Customer LDAP queue backlog is building up"
            description: "[cluster={{ $labels.cluster }}] The customer-ldap queue {{ $labels.queue }} has {{ $value }} waiting jobs. Processing may be falling behind demand."
            dashboard: 'https://grafana.observability{{ if eq $labels.environment "dev" }}.dev{{ end }}.internal.falkordb.cloud/d/ldap-system-dashboard/ldap-system'
            queue_dashboard: 'https://api{{ if eq $labels.environment "dev" }}.dev{{ end }}.falkordb.cloud/v1/customer-ldap/queues?token=<QUEUE_DASHBOARD_TOKEN> (kubectl port-forward svc/customer-ldap-api 3013:3013 -n api)'

        - alert: CustomerLDAPQueueBacklogCritical
          expr: bullmq_queue_jobs_waiting{job="customer-ldap"} > 200
          for: 5m
          labels:
            severity: critical
            cluster: '{{ $labels.cluster }}'
          annotations:
            summary: "Customer LDAP queue has a critical backlog"
            description: "[cluster={{ $labels.cluster }}] The customer-ldap queue has {{ $value }} waiting jobs. Processing is significantly behind — check worker health and Redis connectivity."
            dashboard: 'https://grafana.observability{{ if eq $labels.environment "dev" }}.dev{{ end }}.internal.falkordb.cloud/d/ldap-system-dashboard/ldap-system'
            queue_dashboard: 'https://api{{ if eq $labels.environment "dev" }}.dev{{ end }}.falkordb.cloud/v1/customer-ldap/queues?token=<QUEUE_DASHBOARD_TOKEN> (kubectl port-forward svc/customer-ldap-api 3013:3013 -n api)'

        - alert: CustomerLDAPQueueHasFailedJobs
          expr: bullmq_queue_jobs_failed{job="customer-ldap"} > 0
          for: 5m
          labels:
            severity: warning
            cluster: '{{ $labels.cluster }}'
          annotations:
            summary: "Customer LDAP queue has failed jobs"
            description: "[cluster={{ $labels.cluster }}] The customer-ldap queue has {{ $value }} failed jobs. Inspect failed jobs for errors and retry or discard as appropriate."
            dashboard: 'https://grafana.observability{{ if eq $labels.environment "dev" }}.dev{{ end }}.internal.falkordb.cloud/d/ldap-system-dashboard/ldap-system'
            queue_dashboard: 'https://api{{ if eq $labels.environment "dev" }}.dev{{ end }}.falkordb.cloud/v1/customer-ldap/queues?token=<QUEUE_DASHBOARD_TOKEN> (kubectl port-forward svc/customer-ldap-api 3013:3013 -n api)'

        - alert: CustomerLDAPQueueHighFailuresCritical
          expr: bullmq_queue_jobs_failed{job="customer-ldap"} > 20
          for: 2m
          labels:
            severity: critical
            cluster: '{{ $labels.cluster }}'
          annotations:
            summary: "Customer LDAP queue has a high number of failed jobs"
            description: "[cluster={{ $labels.cluster }}] The customer-ldap queue has {{ $value }} failed jobs. This may indicate a systemic failure in LDAP processing. Immediate investigation required."
            dashboard: 'https://grafana.observability{{ if eq $labels.environment "dev" }}.dev{{ end }}.internal.falkordb.cloud/d/ldap-system-dashboard/ldap-system'
            queue_dashboard: 'https://api{{ if eq $labels.environment "dev" }}.dev{{ end }}.falkordb.cloud/v1/customer-ldap/queues?token=<QUEUE_DASHBOARD_TOKEN> (kubectl port-forward svc/customer-ldap-api 3013:3013 -n api)'

        - alert: CustomerLDAPQueueDelayedJobsHigh
          expr: bullmq_queue_jobs_delayed{job="customer-ldap"} > 100
          for: 10m
          labels:
            severity: warning
            cluster: '{{ $labels.cluster }}'
          annotations:
            summary: "Customer LDAP queue has a high number of delayed jobs"
            description: "[cluster={{ $labels.cluster }}] The customer-ldap queue has {{ $value }} delayed jobs. A large delayed backlog may indicate rate-limiting or scheduling issues."
            dashboard: 'https://grafana.observability{{ if eq $labels.environment "dev" }}.dev{{ end }}.internal.falkordb.cloud/d/ldap-system-dashboard/ldap-system'
            queue_dashboard: 'https://api{{ if eq $labels.environment "dev" }}.dev{{ end }}.falkordb.cloud/v1/customer-ldap/queues?token=<QUEUE_DASHBOARD_TOKEN> (kubectl port-forward svc/customer-ldap-api 3013:3013 -n api)'

    # -----------------------------------------------------------------------
    # ldap-auth service alerts — metrics scraped from ldap-auth-rs pods
    # (app-plane only; will produce no data on ctrl-plane)
    # -----------------------------------------------------------------------
    - name: ldap.rules.auth
      rules:
        - alert: LDAPAuthDown
          expr: up{job="ldap-auth"} == 0
          for: 2m
          labels:
            severity: critical
            cluster: '{{ $labels.cluster }}'
            environment: '{{ $labels.environment }}'
          annotations:
            summary: "LDAP auth service is down (cluster={{ $labels.cluster }})"
            description: "[cluster={{ $labels.cluster }}] The ldap-auth-rs instance {{ $labels.pod }} in namespace {{ $labels.namespace }} is unreachable. LDAP authentication will fail for tenants on this cluster."
            dashboard: 'https://grafana.observability{{ if eq $labels.environment "dev" }}.dev{{ end }}.internal.falkordb.cloud/d/ldap-system-dashboard/ldap-system'
            view_logs: 'https://grafana.observability{{ if eq $labels.environment "dev" }}.dev{{ end }}.internal.falkordb.cloud/explore?orgId=1&left=%7B%22datasource%22%3A%22VictoriaLogs%22%2C%22queries%22%3A%5B%7B%22expr%22%3A%22pod%3A%5C%22{{ $labels.pod }}%5C%22%20AND%20namespace%3A%5C%22{{ $labels.namespace }}%5C%22%22%7D%5D%7D'

        - alert: LDAPAuthNoPodRunning
          expr: (sum by (cluster) (cluster_service_expected{service="ldap-auth"}) > 0) unless (sum by (cluster) (up{job="ldap-auth"}) > 0)
          for: 5m
          labels:
            severity: critical
            cluster: '{{ $labels.cluster }}'
            environment: '{{ $labels.environment }}'
          annotations:
            summary: "No LDAP auth pods running (cluster={{ $labels.cluster }})"
            description: "[cluster={{ $labels.cluster }}] No ldap-auth-rs pods are running or reachable. All LDAP authentication will fail for tenants on this cluster."
            dashboard: 'https://grafana.observability{{ if eq $labels.environment "dev" }}.dev{{ end }}.internal.falkordb.cloud/d/ldap-system-dashboard/ldap-system'

        - alert: LDAPAuthNoAttemptsWhileUp
          expr: sum by (cluster) (up{job="ldap-auth"}) > 0 and sum by (cluster) (increase(ldap_auth_attempts_total{job="ldap-auth"}[15m])) == 0
          for: 15m
          labels:
            severity: warning
            cluster: '{{ $labels.cluster }}'
            environment: '{{ $labels.environment }}'
          annotations:
            summary: "LDAP auth has no attempts while service is up (cluster={{ $labels.cluster }})"
            description: "[cluster={{ $labels.cluster }}] ldap-auth is up but no authentication attempts were recorded in the last 15 minutes. Verify ingress traffic and auth flows."
            dashboard: 'https://grafana.observability{{ if eq $labels.environment "dev" }}.dev{{ end }}.internal.falkordb.cloud/d/ldap-system-dashboard/ldap-system'
